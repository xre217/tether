# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: tether
    runtime: python
    repo: https://github.com/xre217/tether
    plan: free
    region: oregon
    buildCommand: >
      mkdir -p .zero/bin &&
      curl -fsSL https://zerolang.ai/install.sh | bash &&
      cp -r ~/.zero/bin/zero .zero/bin/zero &&
      pip install . &&
      pip install -r requirements-deploy.txt
    startCommand: uvicorn tether.web.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_COMPATIBLE_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
